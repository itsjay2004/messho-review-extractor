<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meesho Review Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <h1>Meesho Review Extractor</h1>
      <p class="subtitle">Scrape reviews from this product page</p>
    </header>

    <div class="actions">
      <button id="scrapeBtn" class="btn btn-primary">Scrape reviews</button>
    </div>

    <div id="status" class="status" aria-live="polite"></div>

    <div id="results" class="results hidden">
      <p class="count"><span id="reviewCount">0</span> reviews scraped</p>
      <div class="export-buttons">
        <button id="exportCsv" class="btn btn-secondary">Export CSV</button>
        <button id="exportTxt" class="btn btn-secondary">Export TXT</button>
      </div>
    </div>

    <footer>
      <p>Open a Meesho product page, then click Scrape. Scroll the reviews section if needed for more results.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
